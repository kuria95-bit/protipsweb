<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pay Test</title>
<style>
body{font-family:sans-serif;padding:20px;background:#f0fdf4;}
button{background:#0f766e;color:#fff;padding:16px 32px;border:none;border-radius:50px;font-size:16px;font-weight:800;cursor:pointer;width:100%;margin-bottom:12px;}
#overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);z-index:9999;align-items:flex-end;justify-content:center;}
#sheet{background:#fff;width:100%;border-radius:24px 24px 0 0;padding:28px 20px 40px;max-height:90vh;overflow-y:auto;}
h2{color:#0f766e;text-align:center;margin-bottom:20px;}
.plan{border:2px solid #e2e8f0;border-radius:12px;padding:14px;margin-bottom:10px;cursor:pointer;}
.plan.sel{border-color:#10b981;background:#f0fdf4;}
.plan-row{display:flex;justify-content:space-between;}
.plan-name{font-weight:800;color:#0f766e;}
.plan-price{font-weight:800;font-size:18px;}
input{width:100%;padding:14px;border:2px solid #e2e8f0;border-radius:12px;font-size:16px;box-sizing:border-box;margin:12px 0;}
#status{padding:12px;border-radius:10px;text-align:center;font-weight:600;display:none;margin-bottom:10px;}
.waiting{background:#fef3c7;color:#92400e;display:block!important;}
.success{background:#ecfdf5;color:#065f46;display:block!important;}
.error{background:#fef2f2;color:#991b1b;display:block!important;}
.close-btn{background:#e2e8f0;color:#333;}
</style>
</head>
<body>
<h2>⚽ Pro Tipsters</h2>
<p style="text-align:center;color:#64748b;margin-bottom:20px;">Tap a button to test the payment modal</p>

<button onclick="openModal('daily')">Daily Ticket — Ksh 99</button>
<button onclick="openModal('fiveday')">5-Day Plan — Ksh 499</button>
<button onclick="openModal('jackpot')">Mega Jackpot — Ksh 599</button>

<div id="overlay">
  <div id="sheet">
    <h2>📱 Pay via M-Pesa</h2>
    <p style="text-align:center;color:#64748b;margin-bottom:16px;">STK Push sent to your phone</p>

    <div class="plan" id="p-daily" onclick="pick('daily')">
      <div class="plan-row"><span class="plan-name">Daily Ticket</span><span class="plan-price">Ksh 99</span></div>
      <small style="color:#64748b;">24hr access · 3-4 picks</small>
    </div>
    <div class="plan" id="p-fiveday" onclick="pick('fiveday')">
      <div class="plan-row"><span class="plan-name">5-Day Subscription</span><span class="plan-price">Ksh 499</span></div>
      <small style="color:#64748b;">5 days access · Best value</small>
    </div>
    <div class="plan" id="p-jackpot" onclick="pick('jackpot')">
      <div class="plan-row"><span class="plan-name">Mega Jackpot</span><span class="plan-price">Ksh 599</span></div>
      <small style="color:#64748b;">7 days · Full 17-game slip</small>
    </div>

    <label style="font-weight:700;">Your M-Pesa Number</label>
    <input type="tel" id="phone" placeholder="e.g. 0712345678" maxlength="13">

    <div id="status"></div>

    <button id="paybtn" onclick="pay()">📱 Send M-Pesa Prompt</button>
    <button class="close-btn" onclick="closeModal()">Cancel</button>
    <p style="text-align:center;font-size:12px;color:#94a3b8;margin-top:8px;">🔒 Secure · PayHero · Till 6012928</p>
  </div>
</div>

<script>
var API = 'https://pro-tipster-api.onrender.com';
var chosen = null;
var timer = null;

function openModal(plan) {
  chosen = null;
  document.getElementById('overlay').style.display = 'flex';
  document.body.style.overflow = 'hidden';
  document.getElementById('status').className = '';
  document.getElementById('status').textContent = '';
  document.getElementById('paybtn').disabled = false;
  document.getElementById('paybtn').textContent = '📱 Send M-Pesa Prompt';
  document.getElementById('phone').value = '';
  ['daily','fiveday','jackpot'].forEach(function(p){
    document.getElementById('p-'+p).classList.remove('sel');
  });
  pick(plan);
}

function closeModal() {
  document.getElementById('overlay').style.display = 'none';
  document.body.style.overflow = '';
  if(timer){ clearInterval(timer); timer = null; }
}

function pick(plan) {
  chosen = plan;
  ['daily','fiveday','jackpot'].forEach(function(p){
    document.getElementById('p-'+p).classList.remove('sel');
  });
  document.getElementById('p-'+plan).classList.add('sel');
}

function setStatus(msg, type) {
  var el = document.getElementById('status');
  el.textContent = msg;
  el.className = type;
}

function pay() {
  if(!chosen){ setStatus('⚠️ Select a plan first', 'error'); return; }
  var phone = document.getElementById('phone').value.trim();
  if(!phone || phone.length < 9){ setStatus('⚠️ Enter your M-Pesa number', 'error'); return; }
  var btn = document.getElementById('paybtn');
  btn.disabled = true;
  btn.textContent = '⏳ Sending...';
  setStatus('📲 Sending prompt to your phone...', 'waiting');

  fetch(API + '/initiate-payment', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({phone: phone, plan: chosen})
  })
  .then(function(r){ return r.json(); })
  .then(function(d){
    if(d.success){
      setStatus('✅ Check your phone! Enter M-Pesa PIN. Waiting...', 'waiting');
      btn.textContent = '⏳ Waiting for payment...';
      poll(phone);
    } else {
      setStatus('❌ Error: ' + (d.error||'Try again'), 'error');
      btn.disabled = false;
      btn.textContent = '📱 Send M-Pesa Prompt';
    }
  })
  .catch(function(e){
    setStatus('❌ Network error. Check connection.', 'error');
    btn.disabled = false;
    btn.textContent = '📱 Send M-Pesa Prompt';
  });
}

function poll(phone) {
  var tries = 0;
  timer = setInterval(function(){
    tries++;
    if(tries > 24){
      clearInterval(timer); timer = null;
      setStatus('⏰ Timed out. If you paid, access activates in 1 min.', 'waiting');
      return;
    }
    fetch(API + '/check-access?phone=' + encodeURIComponent(phone))
    .then(function(r){ return r.json(); })
    .then(function(d){
      if(d.access){
        clearInterval(timer); timer = null;
        setStatus('🎉 Payment confirmed! Access granted!', 'success');
        localStorage.setItem('pt-phone', phone);
        var btn = document.getElementById('paybtn');
        btn.textContent = '✅ Done!';
        btn.disabled = false;
      }
    })
    .catch(function(){});
  }, 5000);
}

// Close if tapping outside sheet
document.getElementById('overlay').addEventListener('click', function(e){
  if(e.target === this) closeModal();
});
</script>
</body>
</html>
