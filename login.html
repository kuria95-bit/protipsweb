<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Pro Tipsters</title>
    <meta name="theme-color" content="#0f766e">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Poppins',sans-serif;background:linear-gradient(160deg,#0a2a22 0%,#0f766e 60%,#10b981 100%);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;}

        .card{background:#fff;border-radius:24px;padding:32px 24px;width:100%;max-width:400px;box-shadow:0 24px 60px rgba(0,0,0,.25);}

        .logo{text-align:center;margin-bottom:24px;}
        .logo-icon{width:64px;height:64px;background:linear-gradient(135deg,#0f766e,#10b981);border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:30px;margin:0 auto 12px;}
        .logo h1{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:#1e2937;}
        .logo p{font-size:12.5px;color:#64748b;margin-top:3px;}

        .form-group{margin-bottom:16px;}
        label{display:block;font-size:12.5px;font-weight:600;color:#374151;margin-bottom:6px;}
        input{width:100%;padding:13px 16px;border:1.5px solid #e2e8f0;border-radius:12px;font-size:14px;font-family:'Poppins',sans-serif;color:#1e2937;outline:none;transition:border .2s;}
        input:focus{border-color:#0f766e;}
        input.error{border-color:#ef4444;}

        .phone-wrap{display:flex;gap:8px;}
        .phone-prefix{background:#f1f5f9;border:1.5px solid #e2e8f0;border-radius:12px;padding:13px 14px;font-size:14px;font-weight:600;color:#374151;white-space:nowrap;flex-shrink:0;}

        .btn{width:100%;padding:14px;background:linear-gradient(135deg,#0f766e,#10b981);color:#fff;border:none;border-radius:50px;font-size:15px;font-weight:700;font-family:'Poppins',sans-serif;cursor:pointer;margin-top:8px;box-shadow:0 6px 20px rgba(15,118,110,.35);transition:transform .2s,opacity .2s;}
        .btn:hover{transform:translateY(-1px);}
        .btn:disabled{opacity:.6;cursor:not-allowed;transform:none;}

        .error-msg{background:#fef2f2;border:1px solid #fecaca;color:#dc2626;border-radius:10px;padding:10px 14px;font-size:12.5px;margin-bottom:14px;display:none;}
        .success-msg{background:#f0fdf4;border:1px solid #bbf7d0;color:#15803d;border-radius:10px;padding:10px 14px;font-size:12.5px;margin-bottom:14px;display:none;}

        .divider{text-align:center;color:#94a3b8;font-size:12px;margin:18px 0;position:relative;}
        .divider::before,.divider::after{content:'';position:absolute;top:50%;width:42%;height:1px;background:#e2e8f0;}
        .divider::before{left:0;} .divider::after{right:0;}

        .link-row{text-align:center;font-size:13px;color:#64748b;margin-top:16px;}
        .link-row a{color:#0f766e;font-weight:700;text-decoration:none;}

        .back{display:flex;align-items:center;gap:6px;color:rgba(255,255,255,.7);font-size:13px;font-weight:600;text-decoration:none;margin-bottom:20px;align-self:flex-start;}
        .back:hover{color:#fff;}

        .spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px;}
        @keyframes spin{to{transform:rotate(360deg)}}

        .forgot{text-align:right;margin-top:4px;}
        .forgot a{font-size:12px;color:#0f766e;font-weight:600;text-decoration:none;}
    </style>
</head>
<body>

    <a href="/" class="back">← Back to site</a>

    <div class="card">
        <div class="logo">
            <div class="logo-icon">⚽</div>
            <h1>Welcome Back</h1>
            <p>Login to access your Pro Tipsters account</p>
        </div>

        <div class="error-msg" id="errorMsg"></div>
        <div class="success-msg" id="successMsg"></div>

        <div class="form-group">
            <label>Phone Number</label>
            <div class="phone-wrap">
                <div class="phone-prefix">🇰🇪 +254</div>
                <input type="tel" id="phone" placeholder="7XX XXX XXX" maxlength="9" inputmode="numeric">
            </div>
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="Enter your password">
            <div class="forgot"><a href="#" onclick="forgotPassword()">Forgot password?</a></div>
        </div>

        <button class="btn" id="loginBtn" onclick="handleLogin()">Login to My Account</button>

        <div class="divider">or</div>

        <div class="link-row">
            New here? <a href="/register.html">Create an account →</a>
        </div>
        <div class="link-row" style="margin-top:10px;">
            <a href="/">← Continue browsing free tips</a>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script>
        const config = {
            apiKey:            "AIzaSyAM8rbDtHmITlTF9ucEjbYuoyAiqB8UuZo",
            authDomain:        "pro-tipsters-94171.firebaseapp.com",
            projectId:         "pro-tipsters-94171",
            storageBucket:     "pro-tipsters-94171.firebasestorage.app",
            messagingSenderId: "737923794509",
            appId:             "1:737923794509:web:921f6a558c11786beebe04"
        };
        firebase.initializeApp(config);
        const auth = firebase.auth();
        const db   = firebase.firestore();

        // If already logged in, redirect
        auth.onAuthStateChanged(user => {
            if(user) window.location.href = '/members.html';
        });

        function getEmail(){
            const phone = document.getElementById('phone').value.trim().replace(/\s/g,'');
            return '254' + phone + '@protipsters.app';
        }

        async function handleLogin(){
            const phone    = document.getElementById('phone').value.trim();
            const password = document.getElementById('password').value;
            const btn      = document.getElementById('loginBtn');
            const errEl    = document.getElementById('errorMsg');
            const sucEl    = document.getElementById('successMsg');

            errEl.style.display = 'none';
            sucEl.style.display = 'none';

            if(phone.length < 9){ showError('Enter a valid 9-digit phone number'); return; }
            if(!password){ showError('Please enter your password'); return; }

            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span>Logging in...';

            try{
                await auth.signInWithEmailAndPassword(getEmail(), password);
                sucEl.textContent = '✅ Login successful! Redirecting...';
                sucEl.style.display = 'block';
                setTimeout(()=> window.location.href = '/members.html', 1200);
            } catch(e){
                let msg = 'Login failed. Check your number and password.';
                if(e.code === 'auth/user-not-found') msg = 'No account found. Please register first.';
                if(e.code === 'auth/wrong-password') msg = 'Wrong password. Try again.';
                if(e.code === 'auth/too-many-requests') msg = 'Too many attempts. Try again later.';
                showError(msg);
                btn.disabled = false;
                btn.innerHTML = 'Login to My Account';
            }
        }

        async function forgotPassword(){
            const phone = document.getElementById('phone').value.trim();
            if(phone.length < 9){ showError('Enter your phone number first, then click Forgot Password'); return; }
            try{
                await auth.sendPasswordResetEmail(getEmail());
                document.getElementById('successMsg').textContent = '✅ Reset link sent! Check WhatsApp or contact us on +254762945530';
                document.getElementById('successMsg').style.display = 'block';
            } catch(e){
                showError('Could not send reset. Contact us on WhatsApp.');
            }
        }

        function showError(msg){
            const el = document.getElementById('errorMsg');
            el.textContent = '⚠️ ' + msg;
            el.style.display = 'block';
        }

        // Enter key support
        document.addEventListener('keydown', e => { if(e.key === 'Enter') handleLogin(); });
    </script>
</body>
</html>
